name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test-web:
    name: Web — test & audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Security audit (block on High/Critical)
        run: npm audit --audit-level=high

  test-bot:
    name: Bot — test & audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/bot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Run tests
        run: pytest tests/ -q

      - name: Python dependency audit (block on High/Critical)
        run: pip install pip-audit && pip-audit -r requirements.txt --severity high

  test-api:
    name: API — test, lint & audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bot package
        run: pip install -e ../bot
        working-directory: packages/api

      - name: Install API dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Lint
        run: pip install ruff && ruff check src/ tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ -q \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=75

      - name: Python dependency audit (block on High/Critical)
        run: pip install pip-audit && pip-audit -r requirements.txt --severity high
