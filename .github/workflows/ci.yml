name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Bot package ─────────────────────────────────────────────────────────────
  test-bot:
    name: Test — bot
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'packages/bot/') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          cd packages/bot
          pip install -e ".[dev]"
      - name: Test
        run: |
          cd packages/bot
          pytest

  # ── API package ─────────────────────────────────────────────────────────────
  test-api:
    name: Test — api
    runs-on: ubuntu-latest
    needs: test-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install -e packages/bot
          cd packages/api
          pip install -r requirements.txt
      - name: Test
        run: |
          cd packages/api
          pytest

  # ── Web package ─────────────────────────────────────────────────────────────
  test-web:
    name: Test — web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - name: Install
        run: cd packages/web && npm ci
      - name: Lint
        run: cd packages/web && npm run lint
      - name: Test
        run: cd packages/web && npm test
      - name: Build
        run: cd packages/web && npm run build

  # ── Security audit ──────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: cd packages/web && npm ci
      - run: cd packages/web && npm audit --audit-level=high
