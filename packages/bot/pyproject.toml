[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sonarft-bot"
version = "1.0.0"
description = "SonarFT core trading engine — indicators, execution, exchange integration"
requires-python = ">=3.10"
dependencies = [
    "pandas==3.0.2",
    "pandas-ta==0.4.71b0",
    "simple-websocket==1.1.0",
    "ccxt==4.5.48",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio"]

[tool.setuptools]
py-modules = [
    "sonarft_api_manager",
    "sonarft_bot",
    "sonarft_execution",
    "sonarft_helpers",
    "sonarft_indicators",
    "sonarft_manager",
    "sonarft_math",
    "sonarft_prices",
    "sonarft_search",
    "sonarft_validators",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
