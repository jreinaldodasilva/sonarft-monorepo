[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sonarft-bot"
version = "1.0.0"
description = "SonarFT core trading engine — indicators, execution, exchange integration"
requires-python = ">=3.10"
dependencies = [
    "pandas==3.0.2",
    "pandas-ta==0.4.71b0",
    "simple-websocket==1.1.0",
    "ccxt==4.5.48",
    "ccxt[pro]==4.5.48",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff", "mypy"]

[tool.setuptools]
py-modules = [
    "config_schemas",
    "models",
    "sonarft_api_manager",
    "sonarft_bot",
    "sonarft_execution",
    "sonarft_helpers",
    "sonarft_indicators",
    "sonarft_manager",
    "sonarft_math",
    "sonarft_metrics",
    "sonarft_prices",
    "sonarft_search",
    "sonarft_validators",
    "trade_executor",
    "trade_processor",
    "trade_validator",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

# Ruff lint/format rules are inherited from the root pyproject.toml.
# Only package-specific overrides are listed here.

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_return_any = false
warn_unused_ignores = true
no_implicit_optional = true
