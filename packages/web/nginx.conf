server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_vary on;

    # --- Security headers (applied to all responses) ---
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "DENY"                             always;
    add_header Referrer-Policy         "no-referrer"                      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy      "geolocation=(), microphone=()"   always;

    # Content Security Policy (HTTP header — frame-ancestors is effective here,
    # unlike the <meta> tag which browsers ignore for that directive).
    # connect-src covers the sonarft API, WebSocket, CoinGecko, and Netlify Identity.
    # Update VITE_API_URL / VITE_WS_URL values here when the API domain changes.
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data:; \
         font-src 'self'; \
         connect-src 'self' \
           https://api.sonarft.com \
           wss://api.sonarft.com \
           https://api.coingecko.com \
           https://*.netlify.com \
           https://*.netlify.app; \
         frame-ancestors 'none'; \
         base-uri 'self'; \
         form-action 'self';"
        always;

    # --- Routes ---

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (content-hashed filenames)
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html so the app shell is always fresh
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
